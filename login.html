<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModernTech HR | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/styles.css" rel="stylesheet">
</head>
<body>
    <main id="loginApp" class="container py-4 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10">
                <section class="hero-strip p-4 p-md-5 mb-4 fade-up">
                    <span class="badge badge-soft mb-3">Proof of Concept</span>
                    <h1 class="brand-title mb-2">ModernTech HR System</h1>
                    <p class="mb-0">Centralized employee management, attendance, payroll, and digital workflows in one interface.</p>
                </section>
            </div>
            <div class="col-12 col-md-8 col-lg-5">
                <section class="app-shell p-4 fade-up delay-1">
                    <h2 class="h4 brand-title mb-3">Sign in</h2>
                    <p class="text-secondary small">Use the demo credentials provided below.</p>

                    <div v-if="errorMessage" class="alert alert-danger py-2">{{ errorMessage }}</div>

                    <form @submit.prevent="login" novalidate>
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input id="username" v-model.trim="form.username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input id="password" v-model="form.password" type="password" class="form-control" required minlength="6">
                        </div>
                        <button class="btn btn-brand w-100" type="submit">Login</button>
                    </form>

                    <hr>
                    <div class="small text-secondary">
                        <div><strong>Username:</strong> hradmin</div>
                        <div><strong>Password:</strong> hr@1234</div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    form: {
                        username: "",
                        password: ""
                    },
                    errorMessage: ""
                };
            },
            mounted() {
                const session = localStorage.getItem("moderntech-hr-session");
                if (session) {
                    window.location.href = "index.html";
                }
            },
            methods: {
                login() {
                    const isValid = this.form.username === "hradmin" && this.form.password === "hr@1234";

                    if (!isValid) {
                        this.errorMessage = "Invalid credentials. Please use the demo account.";
                        return;
                    }

                    localStorage.setItem(
                        "moderntech-hr-session",
                        JSON.stringify({ username: this.form.username, loggedInAt: new Date().toISOString() })
                    );
                    window.location.href = "index.html";
                }
            }
        }).mount("#loginApp");
    </script>
</body>
</html>
